services:
  gateway:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on: [frontend, backend]
    restart: always

  backend:
    build: ./backend
    env_file: .env
    environment:
      - PORT=4000
    expose: ["4000"]
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://livedraft.gradeu.in
        - VITE_WS_URL=wss://livedraft.gradeu.in
    expose: ["80"]
    restart: always
